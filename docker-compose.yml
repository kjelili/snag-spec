services:
  postgres:
    image: postgres:16
    container_name: snag-spec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: snagtospec
    ports:
      - "5432:5432"
    volumes:
      - snag_spec_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d snagtospec"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  snag_spec_pgdata:
